    </g>

    <!-- Shining moon -->
    <g class="moon" aria-hidden="true">
        <circle class="moon-glow" cx="1420" cy="60" r="70" fill="url(#moonGlow)" />
        <circle cx="1420" cy="60" r="26" fill="url(#moonBody)" />
        <circle cx="1412" cy="51" r="4" fill="#dcd6b8" opacity="0.5" />
