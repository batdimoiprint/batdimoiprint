            <g class="ship ship1" transform="translate(300 278)">
                <g class="ship-bob">
                    <path d="M-34 0 Q 0 8 34 0 L26 14 Q 0 20 -26 14 Z" fill="#0d1b2a" />
                    <rect x="-1.5" y="-38" width="3" height="38" fill="#0d1b2a" />
                    <path d="M3 -36 L3 -4 L26 -4 Z" fill="#dfe9f5" opacity="0.9" />
                    <path d="M-3 -30 L-3 -4 L-20 -4 Z" fill="#c9d9ec" opacity="0.85" />
