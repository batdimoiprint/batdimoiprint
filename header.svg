    <!-- Main title: Kenny Reyes -->
    <text x="800" y="115" class="header-title" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
        Kenny Reyes
    </text>

    <!-- Subtitle: Full Stack Developer - Aspiring DevOps Engineer -->
    <text x="800" y="200" class="header-subtitle" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
        Full Stack Developer - Aspiring DevOps Engineer
    </text>

    <text x="800" y="250" class="header-link" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
        kennyreyes.dev
    </text>

