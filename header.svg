<svg width="100%" viewBox="0 0 1600 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
        <!-- Import custom font from Google Fonts -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;display=swap');

            /* Use clamp(min, preferred vw, max) so text doesn't get too small in narrow previews */
            .header-title {
                font-family: 'IBM Plex Mono', Monaco, Menlo, 'Ubuntu Mono', monospace;
                font-weight: 700;
                font-size: clamp(70px, 8vw, 150px);
                letter-spacing: .05em;
                /* black outline */
                stroke: #000;
                stroke-width: 4px;
                paint-order: stroke fill;
                stroke-linejoin: round;
            }

            .header-subtitle {
                font-family: 'IBM Plex Mono', Monaco, Menlo, 'Ubuntu Mono', monospace;
                font-weight: 400;
                font-size: clamp(30px, 3.2vw, 60px);
                /* subtle black outline */
                stroke: #000;
                stroke-width: 2px;
                paint-order: stroke fill;
                stroke-linejoin: round;
            }


            .header-link {
                font-family: 'IBM Plex Mono', Monaco, Menlo, 'Ubuntu Mono', monospace;
                font-weight: 400;
                font-size: clamp(20px, 2.5vw, 45px);
                /* subtle black outline */
                stroke: #000;
                stroke-width: 2px;
                paint-order: stroke fill;
                stroke-linejoin: round;
            }


            .waves {
                transform: translateY(0);
            }

            .wave {
                animation: waveMove 22s linear infinite;
            }

            .wave.wave2 {
                animation-duration: 16s;
                animation-direction: reverse;
                opacity: .6;
            }

            .wave.wave3 {
                animation-duration: 30s;
                opacity: .4;
            }

            @keyframes waveMove {
                from {
                    transform: translateX(0);
                }

                to {
                    transform: translateX(-1200px);
                }
            }

            /* Sparkle glints riding the wave surface */
            .glint {
                animation: glintFade 2.8s ease-in-out infinite;
            }

            @keyframes glintFade {

                0%,
                100% {
                    opacity: 0;
                }

                50% {
                    opacity: .7;
                }
            }

            /* Stars */
            .stars circle {
                animation: twinkle 4s ease-in-out infinite;
            }

            .stars circle:nth-child(3n) {
                animation-duration: 5.5s;
                animation-delay: 1s;
            }

            .stars circle:nth-child(4n) {
                animation-duration: 6.2s;
                animation-delay: 2s;
            }

            .stars circle:nth-child(5n) {
                animation-duration: 7.1s;
                animation-delay: 1.5s;
            }

            @keyframes twinkle {

                0%,
                100% {
                    opacity: .15;
                }

                50% {
                    opacity: .9;
                }
            }

            /* Moon */
            .moon-glow {
                animation: moonPulse 5s ease-in-out infinite;
                transform-origin: 1420px 60px;
            }

            @keyframes moonPulse {

                0%,
                100% {
                    opacity: .5;
                    transform: scale(1);
                }

                50% {
                    opacity: .85;
                    transform: scale(1.08);
                }
            }

            /* Ships bobbing on the swell */
            .ship-bob {
                animation: shipBob 7s ease-in-out infinite;
            }

            .ship2 .ship-bob {
                animation-duration: 9s;
                animation-delay: 1.5s;
            }

            .ship3 .ship-bob {
                animation-duration: 8s;
                animation-delay: .8s;
            }

            @keyframes shipBob {

                0%,
                100% {
                    transform: translateY(0) rotate(-1.2deg);
                }

                50% {
                    transform: translateY(4px) rotate(1.4deg);
                }
            }
        </style>

        <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fffbe0" stop-opacity="0.9" />
            <stop offset="60%" stop-color="#fffbe0" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#fffbe0" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="moonBody" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f0ecd6" />
        </radialGradient>
    </defs>
    <g class="stars" aria-hidden="true">
